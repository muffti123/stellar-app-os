name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI_BUILD_ENFORCED: true

# ─── Shared boilerplate for every Node job ─────────────────────────────────────
#
# Each job repeats the checkout + pnpm + node setup because that keeps jobs
# hermetic — no shared state, no cross-job coupling.  If latency becomes a
# concern, extract these steps into a composite action in .github/actions/.

jobs:
  # ═════════════════════════════════════════════════════════════════════════════
  # PHASE 1 — Fast quality gates (run in parallel, < 2 min each)
  # ═════════════════════════════════════════════════════════════════════════════

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --reporter=junit --outputFile=test-results.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  env-check:
    name: Env vars
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Validate env vars are not placeholders
        run: |
          errors=0
          while IFS= read -r line; do
            [[ "$line" =~ ^# || -z "$line" ]] && continue
            var="${line%%=*}"
            val="${line#*=}"
            val="${val#\"}"; val="${val%\"}"
            if [[ "$val" == REPLACE_WITH_* ]]; then
              echo "⚠️  $var still contains a placeholder: $val"
              errors=$(( errors + 1 ))
            fi
          done < .env.example
          if (( errors > 0 )); then
            echo "Found $errors placeholder(s). Update .env before production."
          else
            echo "✅ All env vars look good."
          fi
          # Non-blocking — placeholders are expected during development

  # ═════════════════════════════════════════════════════════════════════════════
  # PHASE 2 — Expensive gate (build).  Waits for all Phase-1 gates to pass.
  # ═════════════════════════════════════════════════════════════════════════════

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test]
    outputs:
      build-cache-hit: ${{ steps.build-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Cache .next between CI runs (keyed on source hash)
      - name: Cache Next.js build
        id: build-cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', '**/*.[jt]s', '**/*.[jt]sx', '**/*.css') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_USDC_ISSUER: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
          NEXT_PUBLIC_TREE_ISSUER: GCIBUILD000000000000000000000000000000000000000000000000
          NEXT_PUBLIC_CARBON_CREDIT_ISSUER: GDUKMGUGDORQJH6YWY4RHDE6GV3NCYCBN3MORXYL43TSJPCCZFLNOA5H
          NEXT_PUBLIC_CONTRACT_TREE_ESCROW: CBUILD0000000000000000000000000000000000000000000000000000
          NEXT_PUBLIC_CONTRACT_ESCROW_MILESTONE: CBUILD0000000000000000000000000000000000000000000000000000
          NEXT_PUBLIC_CONTRACT_LOCATION_PROOF: CBUILD0000000000000000000000000000000000000000000000000000
          NEXT_PUBLIC_CONTRACT_NULLIFIER_REGISTRY: CBUILD0000000000000000000000000000000000000000000000000000
          NEXT_PUBLIC_PLANTING_ADDRESS: GABEMKJNR4GK7M4FROGA7I7PG63N2CKE3EGDSBSISG56SVL2O3KRNDXA
          NEXT_PUBLIC_REPLANTING_BUFFER_ADDRESS: GBUQWP3BOUZX34TOND2QV7QQ7K7VJTG6VSE62MFPXXXIAGKZ6YTDCXI
          NEXT_PUBLIC_BULK_RECIPIENT_ADDRESS: GABEMKJNR4GK7M4FROGA7I7PG63N2CKE3EGDSBSISG56SVL2O3KRNDXA
          NEXT_PUBLIC_ANCHOR_API_URL: https://testanchor.stellar.org
          NEXT_PUBLIC_ANCHOR_HOME_DOMAIN: testanchor.stellar.org
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ═════════════════════════════════════════════════════════════════════════════
  # PHASE 3 — Docker image (main branch only)
  # ═════════════════════════════════════════════════════════════════════════════

  docker:
    name: Docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30
